<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🌿 記帳本</title>
<!-- PWA：加入手機主畫面 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="記帳本">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F4EDE0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-tc-webfont@1.0.0/style.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4EDE0;--surf:#FBF6EE;--card:#F7F1E4;
  --bdr:#DCCDB8;--dk:#3A2A1C;--md:#7B5B43;--lt:#AE9278;
  --T:#C07848;--Tl:#EDD9C0;
  --S:#5E7E68;--Sl:#C4D9C8;
  --J:#7B6DAE;--Jl:#E0DCEF;
  --F:#7094A8;--Fl:#D6E8F2;
  --P:#A07840;--Pl:#EDE0C0;
  --W:#B85050;--Wl:#F0D0D0;
  --GB:#8FA5B8;--GBl:#D8E4EE;--GBdk:#3D5468;
  --Cash:#5A8A70;--Cashl:#C8E4D8;  /* 現金綠 */
  --fn:'LXGW WenKai TC','Noto Serif TC',serif;
}
body{background:var(--bg);color:var(--dk);font-family:var(--fn);min-height:100vh;-webkit-font-smoothing:antialiased}
button,input{font-family:var(--fn);outline:none}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
#root{max-width:480px;margin:0 auto}

/* ─── HEADER ─── */
.hd{background:var(--surf);border-bottom:1px solid var(--bdr);padding:12px 14px 0;position:sticky;top:0;z-index:50}
.mnav{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.mlbl{flex:1;text-align:center;font-size:18px;font-weight:500}
.nb{background:none;border:1px solid var(--bdr);border-radius:7px;padding:4px 8px;color:var(--md);font-size:13px;cursor:pointer}
.nb:hover{background:var(--card)}
.sync{font-size:10px;padding:2px 6px;border-radius:20px;background:var(--Tl);color:var(--md)}
.sync.ok{background:var(--Sl);color:var(--S)}
.sync.err{background:var(--Wl);color:var(--W);cursor:pointer}
.tabs{display:flex}
.tb{flex:1;padding:7px 2px;background:none;border:none;border-bottom:2.5px solid transparent;font-size:11px;color:var(--lt);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:2px;white-space:nowrap}
.tb.on{color:var(--T);border-bottom-color:var(--T)}
.tb.on.stab{color:var(--GB);border-bottom-color:var(--GB)}
.tb.on.ftab{color:var(--F);border-bottom-color:var(--F)}
.tb.on.ctab{color:var(--Cash);border-bottom-color:var(--Cash)}

/* ─── SHARED ─── */
.bd{padding:13px 13px 80px}
.pr{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:11px}
.pl{padding:4px 12px;border-radius:20px;border:1px solid var(--bdr);font-size:13px;background:transparent;color:var(--md);cursor:pointer}
.pl.on{background:var(--T);border-color:var(--T);color:#fff}
.gh{padding:4px 9px;border-radius:20px;font-size:12px;background:none;border:1px dashed var(--bdr);color:var(--lt);cursor:pointer;display:inline-flex;align-items:center;gap:3px}
.gh:hover{border-color:var(--md);color:var(--md)}
.sc{background:var(--surf);border:1px solid var(--bdr);border-radius:14px;padding:12px 14px;margin-bottom:10px}
.slbl{font-size:11px;color:var(--lt);letter-spacing:.06em;display:block;margin:12px 0 5px}

/* rows */
.r4{display:grid;grid-template-columns:80px 1fr auto 22px;gap:5px;align-items:center;margin-bottom:3px}
.r3{display:grid;grid-template-columns:80px 1fr 22px;gap:5px;align-items:center;margin-bottom:5px}
.ti{background:var(--bg);border:1px solid var(--bdr);border-radius:7px;padding:5px 8px;font-size:13px;color:var(--dk);width:100%}
.ti:focus{border-color:var(--T)}
.ad{background:var(--bg);border:1px solid var(--bdr);border-radius:7px;padding:5px 8px;font-size:14px;text-align:right;cursor:pointer;color:var(--dk);min-height:31px;display:flex;align-items:center;justify-content:flex-end;font-weight:500}
.ad:hover{border-color:var(--T)}
.ad.e{color:var(--lt);font-size:12px;font-weight:400}
.ad.joint{border-color:var(--J);background:var(--Jl)}
.ad.pend{border-color:var(--P);background:var(--Pl)}
.ad.sm{font-size:13px;min-height:27px;padding:3px 7px}

/* tag */
.tagbtn{padding:2px 6px;border-radius:8px;font-size:11px;border:1px solid var(--bdr);background:transparent;color:var(--lt);cursor:pointer;white-space:nowrap}
.tagbtn.joint{background:var(--J);border-color:var(--J);color:#fff}
.tagbtn.pend{background:var(--P);border-color:var(--P);color:#fff}

/* split sub-row */
.split-row{display:flex;align-items:center;gap:5px;padding:2px 0 5px 2px;margin-bottom:3px}
.split-lbl{font-size:11px;color:var(--lt);white-space:nowrap;flex-shrink:0}
.split-note{font-size:11px;color:var(--md)}

.xb{background:none;border:none;cursor:pointer;color:var(--Tl);display:flex;align-items:center;font-size:15px}
.xb:hover{color:var(--T)}
.dv{border:none;border-top:1px solid var(--bdr);margin:10px 0}
.cbf{font-size:12px;color:var(--lt);margin-bottom:5px}
.cbf b{color:var(--md)}

/* card totals */
.trow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-top:10px}
.tbox{border-radius:8px;padding:7px 9px}
.tbox.per{background:var(--card);border:1px solid var(--bdr)}
.tbox.jnt{background:var(--Jl);border:1px solid var(--J)}
.tbox.pnt{background:var(--Pl);border:1px solid var(--P)}
.tfml{font-size:10px;color:var(--lt);margin-bottom:1px}
.tbox.jnt .tfml{color:var(--J)}.tbox.pnt .tfml{color:var(--P)}
.tamt{font-size:15px;font-weight:700}
.tbox.jnt .tamt{color:var(--J)}.tbox.pnt .tamt{color:var(--P)}
.lsb{margin-top:7px;width:100%;padding:7px;border:1px dashed var(--bdr);border-radius:8px;background:none;cursor:pointer;color:var(--lt);font-size:12px;display:flex;align-items:center;justify-content:center;gap:4px}
.lsb:hover{border-color:var(--T);color:var(--T)}
.ncr{display:flex;gap:5px;align-items:center;flex:1;min-width:130px}
.nci{flex:1;background:var(--bg);border:1px solid var(--T);border-radius:7px;padding:4px 8px;font-size:13px;color:var(--dk)}
.ncc{padding:4px 11px;border-radius:20px;font-size:12px;background:var(--T);color:#fff;border:none;cursor:pointer}

/* ─── CASH PAGE ─── */
.cash-add{background:var(--surf);border:1px solid var(--bdr);border-radius:13px;padding:12px 14px;margin-bottom:12px}
.cash-add-title{font-size:12px;color:var(--lt);margin-bottom:8px;letter-spacing:.05em}
.cash-grid{display:grid;grid-template-columns:50px 80px 1fr 36px;gap:5px;align-items:center}
.day-input{background:var(--bg);border:1px solid var(--bdr);border-radius:7px;padding:5px 6px;font-size:13px;color:var(--dk);width:100%;text-align:center}
.add-btn{background:var(--Cash);color:#fff;border:none;border-radius:7px;padding:6px 8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px}
.cash-item{background:var(--surf);border:1px solid var(--bdr);border-radius:10px;padding:8px 12px;margin-bottom:6px;display:grid;grid-template-columns:30px 90px 1fr 22px;gap:6px;align-items:center}
.cash-day{font-size:12px;color:var(--lt);text-align:center}
.cash-amt{font-size:15px;font-weight:700;color:var(--dk);text-align:right}
.cash-note{font-size:13px;color:var(--md)}
.cash-total{margin-top:14px;padding:11px 14px;background:var(--Cashl);border-radius:11px;border:1px solid var(--Cash);display:flex;justify-content:space-between;align-items:baseline}
.cash-total-l{font-size:13px;color:var(--Cash)}
.cash-total-a{font-size:22px;font-weight:700;color:var(--Cash)}

/* ─── SUMMARY ─── */
.sg{font-size:10px;color:var(--lt);letter-spacing:.07em;margin:0 0 7px;display:flex;align-items:center;gap:6px}
.sg::after{content:'';flex:1;border-top:1px dashed var(--bdr)}
.sg.fsg{color:var(--F)}.sg.fsg::after{border-color:var(--F)}
.sg.csg{color:var(--Cash)}.sg.csg::after{border-color:var(--Cash)}

/* pie */
.pie-wrap{background:var(--surf);border:1px solid var(--bdr);border-radius:13px;padding:13px;margin-bottom:10px}
.pie-row{display:flex;align-items:center;gap:11px}
.pie-legend{flex:1;overflow:hidden}
.pie-li{display:flex;align-items:center;gap:4px;margin-bottom:4px;min-width:0}
.pie-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.pie-lbl{font-size:11px;color:var(--lt);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pie-lbl.dim{text-decoration:line-through;opacity:.5}
.pie-val{font-size:11px;font-weight:500;color:var(--dk);flex-shrink:0}
.pie-val.dim{opacity:.5}
.skip-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:9px;padding-top:9px;border-top:1px dashed var(--bdr)}
.skip-chip{padding:3px 7px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid var(--F);background:var(--Fl);color:var(--F);white-space:nowrap;display:flex;align-items:center;gap:3px}
.skip-chip.off{border-color:var(--bdr);background:transparent;color:var(--lt);text-decoration:line-through}
.ssc{background:var(--surf);border:1px solid var(--bdr);border-radius:10px;padding:7px 11px;margin-bottom:6px}
.ssc.bsc{border-color:var(--S);background:#EDF6F1}
.sr{display:grid;grid-template-columns:98px 1fr 22px;gap:5px;align-items:center}
.sl{display:flex;align-items:center;gap:4px;font-size:13px;min-width:0}
.ab{font-size:10px;padding:1px 5px;border-radius:7px;white-space:nowrap;flex-shrink:0}
.ab.bab{color:var(--S);background:var(--Sl)}
.ab.jab{color:var(--J);background:var(--Jl)}
.ab.pab{color:var(--P);background:var(--Pl)}
.ab.tab2{color:var(--md);background:var(--Tl)}
.auto-n{text-align:right;font-size:15px;font-weight:700;padding:4px 7px}
.auto-n.bn{color:var(--S)}.auto-n.wn{color:var(--W)}
.tbar{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:10px 13px;margin-bottom:13px}
.tbar-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.tbar-lbl{font-size:12px;color:var(--lt)}
.prog{height:5px;background:var(--bdr);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .3s}
.stot{margin-top:14px;padding:13px 15px;background:var(--GBl);border-radius:12px;border:1px solid var(--GB)}
.stot.over{background:var(--Wl);border-color:var(--W)}
.sleg{font-size:11px;margin-bottom:5px;display:flex;flex-wrap:wrap;gap:3px;align-items:center}
.sbottom{display:flex;justify-content:space-between;align-items:baseline}
.samt{font-size:23px;font-weight:700;color:var(--GBdk)}
.tgt-chip{font-size:11px;margin-top:4px;padding:2px 7px;border-radius:20px;display:inline-block}
.tgt-chip.ok{background:var(--Sl);color:var(--S)}
.tgt-chip.over{background:var(--Wl);color:var(--W)}
.float-box{margin-top:8px;padding:10px 13px;border-radius:10px;display:flex;justify-content:space-between;align-items:center}
.float-box.jbox{background:var(--Jl);border:1px solid var(--J)}
.float-box.pbox{background:var(--Pl);border:1px solid var(--P)}
.fb-l{font-size:13px;font-weight:500}
.fb-s{font-size:10px;margin-top:1px}
.jbox .fb-l,.jbox .fb-s{color:var(--J)}
.pbox .fb-l,.pbox .fb-s{color:var(--P)}
.fb-a{font-size:19px;font-weight:700}
.jbox .fb-a{color:var(--J)}.pbox .fb-a{color:var(--P)}

/* ─── REPORT MODAL ─── */
.rpt-ov{position:fixed;inset:0;background:rgba(40,28,16,.6);display:flex;flex-direction:column;z-index:300;animation:fi .12s}
.rpt-panel{background:var(--surf);display:flex;flex-direction:column;margin-top:50px;border-radius:20px 20px 0 0;animation:su .2s cubic-bezier(.2,.7,0,1);position:absolute;left:0;right:0;bottom:0;top:50px;max-width:480px;margin-left:auto;margin-right:auto}
.rpt-header{padding:14px 16px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.rpt-title{font-size:16px;font-weight:500}
.rpt-body{flex:1;overflow-y:auto;padding:14px 16px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;min-height:0}
.rpt-text{font-size:12px;line-height:1.8;color:var(--dk);white-space:pre-wrap;font-family:'Noto Serif TC',serif;background:var(--bg);border-radius:9px;padding:12px 14px;border:1px solid var(--bdr)}
.rpt-copy{padding:8px 18px;background:var(--S);color:#fff;border:none;border-radius:20px;cursor:pointer;font-size:13px;margin-top:12px;width:100%}
.rpt-copy.done{background:var(--F)}

/* ─── FIXED PAGE ─── */
.fhero{background:var(--Fl);border:1px solid var(--F);border-radius:12px;padding:12px 14px;margin-bottom:12px}
.fhero-t{font-size:14px;font-weight:500;color:var(--F);margin-bottom:2px;display:flex;align-items:center;gap:5px}
.fhero-s{font-size:12px;color:#3D6070}
.color-dot-hint{font-size:10px;color:var(--lt);margin-top:2px;padding-left:2px}
.tgt-sec{background:var(--surf);border:1px solid var(--bdr);border-radius:11px;padding:11px 13px;margin-bottom:12px}
.tgt-sec-t{font-size:11px;color:var(--lt);letter-spacing:.06em;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.frow{display:grid;grid-template-columns:80px 22px 1fr auto 22px;gap:5px;align-items:center;margin-bottom:5px}
.fsc2{background:var(--surf);border:1px solid var(--bdr);border-radius:10px;padding:8px 11px;margin-bottom:6px}
.fsc2:hover{border-color:var(--F)}.fsc2.buf{border-color:var(--S);background:#EDF6F1}
.bbtn{padding:2px 6px;border-radius:8px;font-size:11px;border:1px solid var(--bdr);background:transparent;color:var(--lt);cursor:pointer;white-space:nowrap}
.bbtn:hover{border-color:var(--S);color:var(--S)}.bbtn.on{background:var(--S);border-color:var(--S);color:#fff}
.buf-disp{background:var(--Sl);border:1px solid var(--S);border-radius:7px;padding:5px 8px;font-size:14px;text-align:right;color:var(--S);font-weight:700;min-height:31px;display:flex;align-items:center;justify-content:flex-end}
.buf-disp.neg{background:var(--Wl);border-color:var(--W);color:var(--W)}
.fsum{margin-top:11px;padding:10px 13px;background:var(--Fl);border-radius:10px;border:1px solid var(--F)}

/* ─── PIN Screen ─── */
.pin-wrap{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500;padding:1rem 1rem 4rem}
.pin-logo{margin-bottom:12px}
.pin-app-name{font-size:11px;color:var(--lt);letter-spacing:.1em;margin-bottom:16px;font-family:var(--fn)}
.pin-title{font-size:20px;font-weight:500;font-family:var(--fn);color:var(--dk);margin-bottom:4px}
.pin-sub{font-size:13px;color:var(--lt);margin-bottom:4px;min-height:20px}
.pin-err{font-size:12px;color:var(--W);margin-bottom:2px;min-height:18px}
.pin-dots{display:flex;gap:16px;margin:20px 0 32px}
.pd{width:14px;height:14px;border-radius:50%;background:var(--bdr);transition:all .15s}
.pd.on{background:var(--T);transform:scale(1.15)}
.pd.err{background:var(--W)}
.pin-grid{display:grid;grid-template-columns:repeat(3,72px);gap:12px}
.pk{width:72px;height:72px;border-radius:50%;border:none;font-size:24px;font-family:var(--fn);color:var(--dk);cursor:pointer;background:var(--surf);box-shadow:0 2px 8px rgba(58,42,28,.1);transition:transform .07s,box-shadow .07s}
.pk:active{transform:scale(.89);box-shadow:none}
.pk.pk-del{background:transparent;box-shadow:none;font-size:20px;color:var(--lt)}
.pk.pk-empty{pointer-events:none;background:transparent;box-shadow:none}
.pin-forget{margin-top:28px;background:none;border:none;color:var(--lt);font-size:12px;cursor:pointer;font-family:var(--fn)}
@keyframes pinShake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.pin-shake{animation:pinShake .35s ease}
/* misc */
.empty{text-align:center;padding:3rem 1rem;color:var(--lt)}
.empty i{font-size:34px;display:block;margin-bottom:9px}.empty p{font-size:14px}
.ar{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px}
.banner{background:#FEF3E2;border-bottom:1px solid #F5C98A;padding:8px 13px;font-size:12px;color:#7C5520;display:flex;align-items:center;gap:5px}

/* ─── CALCULATOR ─── */
.ov{position:fixed;inset:0;background:rgba(50,35,20,.5);display:flex;align-items:flex-end;justify-content:center;z-index:200;animation:fi .1s}
.cp{background:var(--surf);border-radius:20px 20px 0 0;padding:15px 15px 26px;width:100%;max-width:480px;animation:su .18s cubic-bezier(.2,.7,0,1.15)}
.cdisp{background:var(--bg);border-radius:10px;padding:10px 13px 8px;margin-bottom:11px;border:1px solid var(--bdr)}
.cexpr{font-size:12px;color:var(--lt);text-align:right;min-height:15px;margin-bottom:2px}
.cres{font-size:32px;font-weight:700;color:var(--dk);text-align:right;line-height:1.1;word-break:break-all}
.cgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.cb{border:none;border-radius:10px;padding:13px 4px;font-size:18px;font-weight:500;cursor:pointer;transition:transform .06s}
.cb:active{transform:scale(.91)}
.kn{background:var(--card);color:var(--dk);border:1px solid var(--bdr)}
.ko{background:#E8D5BC;color:var(--T)}.ke{background:var(--T);color:#fff}
.kc{background:#E8D5BC;color:var(--md);font-size:13px}
.kk{background:var(--S);color:#fff;font-size:13px;grid-column:span 2}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
</style>
</head>
<body>
<script>
// 先從 localStorage 讀取已存的 Firebase 設定
const _fbc=(function(){try{const v=localStorage.getItem("lb:FBCFG");return v?JSON.parse(v):null;}catch{return null;}})();
const FB=_fbc||{
  apiKey:           "FILL_YOUR_API_KEY",
  messagingSenderId:"FILL_SENDER_ID",
  appId:            "FILL_APP_ID",
  authDomain:       "huasbudget.firebaseapp.com",
  databaseURL:      "https://huasbudget-default-rtdb.firebaseio.com/",
  projectId:        "huasbudget",
  storageBucket:    "huasbudget.appspot.com"
};
let db=null;
const FB_ON=FB.apiKey!=="FILL_YOUR_API_KEY"&&FB.apiKey!=="";
if(FB_ON){try{firebase.initializeApp(FB);db=firebase.database();}catch(e){console.warn(e);}}
const LSG=k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}};
const LSS=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};
async function dbLoad(k){
  if(!db)return null;
  try{const s=await db.ref("ledger/"+k).once("value");return s.val();}
  catch(e){console.warn("Firebase load:",e.code||e.message);window._fbErr=e.code||e.message||"unknown";return null;}
}
async function dbSave(k,d){
  if(!db)return false;
  try{await db.ref("ledger/"+k).set(d);return true;}
  catch(e){
    console.warn("Firebase save:",e.code||e.message);
    window._fbErr=e.code||e.message||"unknown";
    return false;
  }
}
</script>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;
const uid=()=>Math.random().toString(36).slice(2,9);
const fmt=n=>Math.round(Number(n)||0).toLocaleString("zh-TW");
const MO=["一","二","三","四","五","六","七","八","九","十","十一","十二"];
const evalX=s=>{if(!s)return null;try{const r=Function('"use strict";return('+s.replace(/×/g,"*").replace(/÷/g,"/").replace(/[^0-9+\-*/.()]/g,"")+")")();return isFinite(r)?Math.round(r*100)/100:null;}catch{return null;}};

const cycleTag=t=>!t?"joint":t==="joint"?"pending":null;
const tagLabel=t=>!t?"標記":t==="joint"?"金庫 ✓":"待收 ✓";
const tagCls=t=>!t?"":t==="joint"?" joint":" pend";
const adCls=t=>!t?"":t==="joint"?" joint":" pend";
const FPAL=['#7094A8','#5B7E94','#8BAFC4','#4D6B80','#9BBDCC','#3D5A6C'];
const BRED='#A86050'; /* 棕紅色 - 用於標記的固定項目 */
const getFixedColor=(item,idx)=>item.accentColor==='red'?BRED:FPAL[idx%FPAL.length];

/* ─── Donut ─── */
function Donut({segs,size=126,thick=21}){
  const tot=segs.reduce((s,x)=>s+(x.v||0),0);
  if(!tot)return<div style={{width:size,height:size,borderRadius:'50%',background:'var(--bdr)',flexShrink:0}}/>;
  const r=(size-thick)/2,C=2*Math.PI*r,cx=size/2,cy=size/2;
  let rot=-90;
  return(
    <svg width={size} height={size} style={{display:'block',flexShrink:0}}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--card)" strokeWidth={thick}/>
      {segs.filter(s=>s.v>0).map((s,i)=>{
        const pct=s.v/tot,dash=Math.max(0,C*pct-1.5),r0=rot;
        rot+=pct*360;
        return<circle key={i} cx={cx} cy={cy} r={r} fill="none"
          stroke={s.dim?"#D5C8B5":s.color} strokeWidth={thick}
          strokeDasharray={`${dash} ${C}`}
          transform={`rotate(${r0} ${cx} ${cy})`}
          style={{transition:'stroke .25s'}}/>;
      })}
    </svg>
  );
}

/* ─── Calc ─── */
function Calc({init,onOk,onClose}){
  const[ex,sEx]=useState(init?String(init):"");
  const[dp,sDp]=useState(init?fmt(init):"0");
  const upd=e=>{const r=evalX(e);if(r!=null)sDp(fmt(r));else{const m=e.match(/\d+\.?\d*$/);sDp(m?fmt(+m[0]):"0");}};
  const press=k=>{
    if(k==="C"){sEx("");sDp("0");return;}
    if(k==="⌫"){const n=ex.slice(0,-1);sEx(n);n?upd(n):sDp("0");return;}
    if(k==="="){const r=evalX(ex);if(r!=null){sEx(String(r));sDp(fmt(r));}return;}
    const n=ex+k;sEx(n);if(!["+","-","×","÷"].includes(k))upd(n);
  };
  const ok=()=>{const r=evalX(ex);onOk(r!=null?Math.round(r):parseFloat(ex)||0);};
  const KS=[
    {l:"C",c:"kc"},{l:"⌫",c:"kc"},{l:"÷",c:"ko"},{l:"×",c:"ko"},
    {l:"7",c:"kn"},{l:"8",c:"kn"},{l:"9",c:"kn"},{l:"-",c:"ko"},
    {l:"4",c:"kn"},{l:"5",c:"kn"},{l:"6",c:"kn"},{l:"+",c:"ko"},
    {l:"1",c:"kn"},{l:"2",c:"kn"},{l:"3",c:"kn"},{l:"=",c:"ke"},
    {l:"0",c:"kn",s:{gridColumn:"span 2"}},{l:".",c:"kn"},{l:"確認",c:"kk",a:ok},
  ];
  return(<div className="ov" onClick={onClose}><div className="cp" onClick={e=>e.stopPropagation()}>
    <div className="cdisp"><div className="cexpr">{ex||"\u00a0"}</div><div className="cres">{dp}</div></div>
    <div className="cgrid">{KS.map((k,i)=><button key={i} className={`cb ${k.c}`} style={k.s||{}} onClick={k.a||(()=>press(k.l))}>{k.l}</button>)}</div>
  </div></div>);
}

/* ─── Amt ─── */
function Amt({val,set,ph,tag,sm}){
  const[o,sO]=useState(false);
  const has=val!=null&&Number(val)!==0;
  return(<>
    <div className={`ad${sm?" sm":""}${!has?" e":""}${adCls(tag)}`} onClick={()=>sO(true)}>{has?fmt(val):(ph||"點擊輸入")}</div>
    {o&&<Calc init={has?val:0} onOk={v=>{set(v);sO(false);}} onClose={()=>sO(false)}/>}
  </>);
}

/* ─── PinScreen 密碼鎖定元件 ─── */
function PinScreen({onUnlock}){
  const stored=localStorage.getItem("lb:PIN");
  const isSetup=!stored;
  const[input,sInput]=useState("");
  const[err,sErr]=useState(false);
  const[step,sStep]=useState(1);
  const[first,sFirst]=useState("");
  const[shake,sShake]=useState(false);

  const doShake=()=>{sShake(true);setTimeout(()=>{sShake(false);},400);};
  const del=()=>sInput(p=>p.slice(0,-1));

  const press=k=>{
    if(input.length>=4)return;
    const n=input+k;sInput(n);sErr(false);
    if(n.length===4)setTimeout(()=>check(n),150);
  };

  const check=pin=>{
    if(isSetup){
      if(step===1){sFirst(pin);sStep(2);sInput("");}
      else if(pin===first){localStorage.setItem("lb:PIN",pin);onUnlock();}
      else{sErr(true);doShake();sStep(1);sFirst("");sInput("");}
    }else{
      if(pin===stored){onUnlock();}
      else{sErr(true);doShake();sInput("");}
    }
  };

  const KEYS=["1","2","3","4","5","6","7","8","9","","0","⌫"];
  const title=isSetup?(step===1?"設定密碼":"再次確認"):"輸入密碼";
  const sub=isSetup?(step===1?"請設定4位數密碼":"請再輸入一次確認"):"請輸入4位數密碼";

  return(
    <div className="pin-wrap">
      {/* 小金幣 logo */}
      <svg className="pin-logo" width="64" height="64" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <rect width="200" height="200" rx="42" fill="#F4EDE0"/>
        <rect x="89" y="105" width="38" height="49" rx="2" fill="#C49028" stroke="#3A2A1C" strokeWidth="4.5"/>
        <line x1="89" y1="117" x2="127" y2="117" stroke="#3A2A1C" strokeWidth="2.5"/>
        <line x1="89" y1="129" x2="127" y2="129" stroke="#3A2A1C" strokeWidth="2.5"/>
        <line x1="89" y1="141" x2="127" y2="141" stroke="#3A2A1C" strokeWidth="2.5"/>
        <ellipse cx="108" cy="105" rx="19" ry="7.5" fill="#EBC84A" stroke="#3A2A1C" strokeWidth="4.5"/>
        <rect x="142" y="118" width="34" height="36" rx="2" fill="#C49028" stroke="#3A2A1C" strokeWidth="4"/>
        <line x1="142" y1="130" x2="176" y2="130" stroke="#3A2A1C" strokeWidth="2.5"/>
        <line x1="142" y1="142" x2="176" y2="142" stroke="#3A2A1C" strokeWidth="2.5"/>
        <ellipse cx="159" cy="118" rx="17" ry="6.5" fill="#EBC84A" stroke="#3A2A1C" strokeWidth="4"/>
        <circle cx="52" cy="139" r="29" fill="#C49028" stroke="#3A2A1C" strokeWidth="5"/>
        <circle cx="52" cy="139" r="22" fill="#EBC84A"/>
        <text x="52" y="148" textAnchor="middle" fill="#3A2A1C" fontSize="26" fontWeight="bold" fontFamily="Georgia,serif">$</text>
      </svg>
      <div className="pin-app-name">記 帳 本</div>
      <div className="pin-title">{title}</div>
      <div className="pin-sub">{sub}</div>
      <div className="pin-err">{err?(isSetup?"兩次密碼不一致，請重新輸入":"密碼錯誤，請重試"):""}</div>

      {/* 4 個圓點 */}
      <div className={`pin-dots${shake?" pin-shake":""}`}>
        {[0,1,2,3].map(i=>(
          <div key={i} className={`pd${i<input.length?(err?" err":" on"):""}`}/>
        ))}
      </div>

      {/* 數字鍵盤 */}
      <div className="pin-grid">
        {KEYS.map((k,i)=>(
          <button key={i}
            className={`pk${k===""?" pk-empty":k==="⌫"?" pk-del":""}`}
            onClick={()=>k===""?null:k==="⌫"?del():press(k)}>
            {k}
          </button>
        ))}
      </div>

      {/* 忘記密碼 */}
      {!isSetup&&(
        <button className="pin-forget"
          onClick={()=>{if(confirm("清除密碼設定？\n需重新設定新密碼才能進入。")){localStorage.removeItem("lb:PIN");window.location.reload();}}}>
          忘記密碼？
        </button>
      )}
    </div>
  );
}

/* ════════════════ APP ════════════════ */
function App(){
  const now=new Date();
  const[yr,sYr]=useState(now.getFullYear());
  const[mo,sMo]=useState(now.getMonth()+1);
  const[tab,sTab]=useState("cards");
  const[ci,sCi]=useState(0);
  const[ready,sR]=useState(false);
  const[sync,sSy]=useState("");
  const[adding,sAdd]=useState(false);
  const[nn,sNn]=useState("");
  const[showReport,sRpt]=useState(false);
  const[copied,sCopied]=useState(false);
  const[showFBCfg,sFBCfg]=useState(false);
  const[addExpFor,sAddExpFor]=useState(null); /* 新增消費的目標卡 */
  const[expEdit,sExpEdit]=useState(false);    /* 消費明細編輯模式 */
  const[addCbFor,sAddCbFor]=useState(null);   /* 新增回饋的目標卡 */
  const[fbKey,sFbKey]=useState('');
  const[fbSid,sFbSid]=useState('');
  const[fbAid,sFbAid]=useState('');
  const saveFBConfig=()=>{
    if(!fbKey.trim())return;
    localStorage.setItem("lb:FBCFG",JSON.stringify({
      apiKey:fbKey.trim(),messagingSenderId:fbSid.trim(),appId:fbAid.trim(),
      authDomain:"huasbudget.firebaseapp.com",
      databaseURL:"https://huasbudget-default-rtdb.firebaseio.com/",
      projectId:"huasbudget",storageBucket:"huasbudget.appspot.com"
    }));
    window.location.reload();
  };
  const clearFBConfig=()=>{localStorage.removeItem("lb:FBCFG");window.location.reload();};
  /* cash add form */
  const[cDay,sCDay]=useState("");
  const[cAmt,sCAmt]=useState(0);
  const[cNote,sCNote]=useState("");
  const nr=useRef(null);
  const dtimer=useRef(null);
  const ftimer=useRef(null);
  const mkey=`${yr}-${String(mo).padStart(2,"0")}`;

  const[data,sData]=useState({cards:[],salary:[],skipped:[],cash:[]});
  const[fixed,sFixed]=useState({target:0,items:[]});

  /* load fixed */
  useEffect(()=>{
    const lc=LSG("lb:FIXED");
    if(lc)sFixed({target:lc.target||0,items:lc.items||[]});
    dbLoad("FIXED").then(d=>{if(d){sFixed({target:d.target||0,items:d.items||[]});LSS("lb:FIXED",d);}});
  },[]);
  useEffect(()=>{LSS("lb:FIXED",fixed);clearTimeout(ftimer.current);ftimer.current=setTimeout(()=>dbSave("FIXED",fixed),900);},[fixed]);
  const mutF=fn=>sFixed(p=>{const n=JSON.parse(JSON.stringify(p));fn(n);return n;});

  /* load per-month */
  useEffect(()=>{
    sR(false); sSy("");
    // 先清空避免舊資料殘留到新月份
    sData({cards:[],salary:[],skipped:[],cash:[]});
    const lc=LSG("lb:"+mkey);
    if(lc){
      try{
        const lnd={cards:[],salary:[],skipped:[],cash:[],...lc};
        lnd.cards=(lnd.cards||[]).map(card=>({...card,expenses:card.expenses||[],cashback:card.cashback||[]}));
        sData(lnd);
      }catch(e){console.warn("LS parse err",e);}
    }
    dbLoad(mkey).then(d=>{
      if(d){
        const nd={cards:[],salary:[],skipped:[],cash:[],...d};
      // 清理每張卡確保 expenses/cashback 都是陣列
      nd.cards=(nd.cards||[]).map(card=>({...card,expenses:card.expenses||[],cashback:card.cashback||[]}));
        sData(nd);
        LSS("lb:"+mkey,nd);
      }
      sCi(0);
      sR(true);
    });
  },[mkey]);
  useEffect(()=>{
    // ready=false 代表月份切換中，不存資料
    if(!ready)return;
    LSS("lb:"+mkey,data);
    clearTimeout(dtimer.current);
    if(!FB_ON)return;
    sSy("saving");
    dtimer.current=setTimeout(async()=>{
      const ok=await dbSave(mkey,data);
      if(ok){sSy("ok");setTimeout(()=>sSy(""),2500);}
      else{sSy("err");}
    },900);
  },[data,ready,mkey]);

  const mut=fn=>sData(p=>{const n=JSON.parse(JSON.stringify(p));fn(n);return n;});
  const pMo=()=>{if(mo===1){sYr(yr-1);sMo(12);}else sMo(mo-1);};
  const nMo=()=>{if(mo===12){sYr(yr+1);sMo(1);}else sMo(mo+1);};

  /* skip toggle */
  const skipped=data.skipped||[];
  const toggleSkip=id=>mut(d=>{if(!d.skipped)d.skipped=[];const i=d.skipped.indexOf(id);if(i>=0)d.skipped.splice(i,1);else d.skipped.push(id);});

  /* expense helpers — splitAmt: portion of expense attributed to tag */
  const getSplit=(e)=>e.splitAmt!=null?+e.splitAmt:(+e.amt||0);
  const expPersonal=e=>{
    if(!e.tag)return +e.amt||0;
    if(e.tag==="joint")return(+e.amt||0)-getSplit(e); // remainder after joint
    if(e.tag==="pending")return(+e.amt||0)-getSplit(e); // remainder after friend's share
    return +e.amt||0;
  };
  const expJoint=e=>e.tag==="joint"?getSplit(e):0;
  const expPending=e=>e.tag==="pending"?getSplit(e):0;

  const cardPN=c=>(c.expenses||[]).reduce((s,e)=>s+expPersonal(e),0)-(c.cashback||[]).reduce((s,x)=>s+(+x.amt||0),0);
  const cardJT=c=>(c.expenses||[]).reduce((s,e)=>s+expJoint(e),0);
  const cardPT=c=>(c.expenses||[]).reduce((s,e)=>s+expPending(e),0);
  const allJoint=()=>data.cards.reduce((s,c)=>s+cardJT(c),0);
  const allPending=()=>data.cards.reduce((s,c)=>s+cardPT(c),0);

  const si=Math.min(ci,data.cards.length-1);
  const ac=data.cards[Math.max(0,si)]||null;

  const addCard=()=>{if(!nn.trim())return;const idx=data.cards.length;mut(d=>d.cards.push({id:uid(),name:nn.trim(),expenses:[],cashback:[]}));sCi(idx);sAdd(false);sNn("");};
  const delCard=id=>{if(!confirm("確定刪除？"))return;mut(d=>{d.cards=d.cards.filter(c=>c.id!==id);d.salary=d.salary.filter(s=>s.cardId!==id);});sCi(0);};
  const aE=cid=>mut(d=>d.cards.find(c=>c.id===cid)?.expenses.push({id:uid(),amt:0,note:"",tag:null,splitAmt:null}));
  const addExpD=(cid,amt,note)=>mut(d=>d.cards.find(c=>c.id===cid)?.expenses.push({id:uid(),amt,note,tag:null,splitAmt:null}));
  const addCbD=(cid,amt,note)=>mut(d=>d.cards.find(c=>c.id===cid)?.cashback.push({id:uid(),amt,note}));
  const uE=(cid,eid,f,v)=>mut(d=>{const e=d.cards.find(c=>c.id===cid)?.expenses.find(e=>e.id===eid);if(e)e[f]=v;});
  const dE=(cid,eid)=>mut(d=>{const c=d.cards.find(c=>c.id===cid);if(c)c.expenses=c.expenses.filter(e=>e.id!==eid);});
  const cycE=(cid,eid)=>{
    const e=ac?.expenses.find(e=>e.id===eid);
    if(!e)return;
    const newTag=cycleTag(e.tag);
    uE(cid,eid,"tag",newTag);
    // reset splitAmt to null when changing tag (will default to full amount)
    uE(cid,eid,"splitAmt",null);
  };
  const aC=cid=>mut(d=>d.cards.find(c=>c.id===cid)?.cashback.push({id:uid(),amt:0,note:""}));
  const uC=(cid,cbid,f,v)=>mut(d=>{const x=d.cards.find(c=>c.id===cid)?.cashback.find(x=>x.id===cbid);if(x)x[f]=v;});
  const dC=(cid,cbid)=>mut(d=>{const c=d.cards.find(c=>c.id===cid);if(c)c.cashback=c.cashback.filter(x=>x.id!==cbid);});

  /* cash */
  const cashTotal=()=>(data.cash||[]).reduce((s,e)=>s+(+e.amt||0),0);
  const addCash=()=>{
    if(!cAmt)return;
    mut(d=>{if(!d.cash)d.cash=[];d.cash.push({id:uid(),day:+cDay||null,amt:cAmt,note:cNote});});
    sCAmt(0);sCNote("");sCDay("");
  };
  const delCash=id=>mut(d=>{d.cash=(d.cash||[]).filter(e=>e.id!==id);});

  /* salary */
  const cardLinks=data.salary.filter(s=>s.type==="card");
  const oneTimers=data.salary.filter(s=>s.type==="onetime");
  const cardLinksTot=()=>cardLinks.reduce((s,i)=>{const c=data.cards.find(c=>c.id===i.cardId);return s+(c?cardPN(c):0);},0);
  const oneTimeTot=()=>oneTimers.reduce((s,i)=>s+(+i.amt||0),0);

  /* fixed calc */
  const _items=fixed.items||[];
  const bufItem=_items.find(i=>i.isBuffer)||null;
  const nonBuf=_items.filter(i=>!i.isBuffer);
  const activeNonBuf=nonBuf.filter(i=>!skipped.includes(i.id));
  const skippedNonBuf=nonBuf.filter(i=>skipped.includes(i.id));
  const nonBufTot=activeNonBuf.reduce((s,i)=>s+(+i.amt||0),0);
  const bufAmt=(fixed.target||0)-nonBufTot-cardLinksTot()-oneTimeTot();
  const fixedDisp=nonBufTot+(bufItem&&bufAmt>0?bufAmt:0);
  const grand=fixedDisp+cardLinksTot()+oneTimeTot();
  const isOver=fixed.target>0&&grand>fixed.target;
  const pct=fixed.target>0?Math.min(100,Math.round(grand/fixed.target*100)):0;

  const lC=cid=>{const c=data.cards.find(c=>c.id===cid);if(!c||data.salary.some(s=>s.cardId===cid))return;mut(d=>d.salary.push({id:uid(),label:c.name,type:"card",cardId:cid}));};
  const aOT=()=>mut(d=>d.salary.push({id:uid(),label:"",amt:0,type:"onetime"}));
  const uS=(id,f,v)=>mut(d=>{const s=d.salary.find(s=>s.id===id);if(s)s[f]=v;});
  const dS=id=>mut(d=>{d.salary=d.salary.filter(s=>s.id!==id);});
  const toggleBuf=idx=>mutF(d=>{const was=d.items[idx].isBuffer;d.items.forEach(i=>i.isBuffer=false);if(!was)d.items[idx].isBuffer=true;});

  /* pie */
  const pieSegs=[
    ...cardLinks.map(item=>{const c=data.cards.find(c=>c.id===item.cardId);return{label:item.label,v:Math.max(0,c?cardPN(c):0),color:'#C07848'};}).filter(s=>s.v>0),
    ...nonBuf.map((item,i)=>({label:item.label,v:+item.amt||0,color:getFixedColor(item,i),dim:skipped.includes(item.id)})).filter(s=>s.v>0),
    ...(bufItem&&bufAmt>0?[{label:bufItem.label,v:bufAmt,color:'#5E7E68'}]:[]),
    ...oneTimers.filter(i=>+i.amt>0).map(i=>({label:i.label||'額外',v:+i.amt||0,color:'#A07840'})),
  ];
  const fixedPieSegs=[
    ...nonBuf.map((item,i)=>({label:item.label,v:+item.amt||0,color:getFixedColor(item,i)})).filter(s=>s.v>0),
    ...(bufItem&&bufAmt>0?[{label:bufItem.label,v:bufAmt,color:'#5E7E68'}]:[]),
  ];

  /* report */
  const genReport=()=>{
    const L=[];
    L.push(`${yr} 年 ${MO[mo-1]}月 月報表`);
    L.push("");
    if(data.cards.length>0){
      L.push("── 信用卡支出 ─────────────────");
      data.cards.forEach(c=>{
        const pn=cardPN(c),jt=cardJT(c),pt=cardPT(c);
        L.push(`▸ ${c.name}  個人 NT$${fmt(pn)}${jt>0?`  金庫 NT$${fmt(jt)}`:''}${pt>0?`  待收 NT$${fmt(pt)}`:''}`);
        (c.expenses||[]).forEach(e=>{
          const sp=getSplit(e);
          const tag=e.tag==="joint"?` (金庫 NT$${fmt(sp)})`:e.tag==="pending"?` (待收 NT$${fmt(sp)})`:'';
          L.push(`  ${String(fmt(e.amt)).padStart(7)}  ${e.note||'—'}${tag}`);
        });
        if((c.cashback||[]).length>0){const cb=(c.cashback||[]).reduce((s,x)=>s+(+x.amt||0),0);L.push(`  回饋 -NT$${fmt(cb)}`);}
      });
      L.push("");
    }
    if((data.cash||[]).length>0){
      L.push("── 現金支出 ─────────────────");
      (data.cash||[]).forEach(e=>{L.push(`  ${e.day?e.day+"日":' '}  ${String(fmt(e.amt)).padStart(7)}  ${e.note||'—'}`);});
      L.push(`  小計 NT$${fmt(cashTotal())}`);
      L.push("");
    }
    if(fixed.items.length>0){
      L.push("── 固定開銷 ─────────────────");
      fixed.items.forEach(i=>{
        const amt=i.isBuffer?bufAmt:+i.amt;
        const skip=skipped.includes(i.id);
        L.push(`  ${String(fmt(amt)).padStart(7)}  ${i.label}${skip?" (本月暫停)":""}${i.isBuffer?" (自動調整)":""}`);
      });
      L.push("");
    }
    const jt=allJoint(),pt=allPending();
    if(jt>0||pt>0){
      L.push("── 特殊項目 ─────────────────");
      if(jt>0)L.push(`  金庫待轉入  NT$${fmt(jt)}`);
      if(pt>0)L.push(`  待收款      NT$${fmt(pt)}`);
      L.push("");
    }
    L.push("── 月總結 ─────────────────");
    if(cardLinksTot())L.push(`  信用卡個人  NT$${fmt(cardLinksTot())}`);
    if(cashTotal())   L.push(`  現金支出    NT$${fmt(cashTotal())}`);
    if(fixedDisp)     L.push(`  固定開銷    NT$${fmt(fixedDisp)}`);
    if(oneTimeTot())  L.push(`  本月額外    NT$${fmt(oneTimeTot())}`);
    L.push(`  合計        NT$${fmt(grand)}`);
    if(fixed.target>0)L.push(`  目標        NT$${fmt(fixed.target)}  (${pct}%${isOver?"  ⚠️ 超支":"  ✓"})`);
    return L.join("\n");
  };

  const copyReport=()=>{
    navigator.clipboard.writeText(genReport()).then(()=>{sCopied(true);setTimeout(()=>sCopied(false),2000);});
  };

    {/* Firebase 狀態整合進齒輪按鈕，不顯示 banner */}

      <div className="mnav">
        <button className="nb" onClick={pMo}><i className="ti ti-chevron-left"/></button>

        <button className="nb" onClick={nMo}><i className="ti ti-chevron-right"/></button>
        {sync==="saving"&&<span className="sync">同步中…</span>}
        {sync==="ok"&&<span className="sync ok">✓</span>}
        {sync==="err"&&<span className="sync err" title="同步失敗，點此設定">⚠</span>}

        <button className={`tb ftab${tab==="fixed"?" on":""}`} onClick={()=>sTab("fixed")}><i className="ti ti-calendar-repeat"/> 固定</button>
        <button className={`tb ctab${tab==="cash"?" on":""}`} onClick={()=>sTab("cash")}><i className="ti ti-cash"/> 現金</button>

          :<button className="gh" onClick={()=>{sAdd(true);setTimeout(()=>nr.current?.focus(),50);}}><i className="ti ti-plus"/> 新增卡片</button>
        }
      </div>
      {!ac&&<div className="empty"><i className="ti ti-credit-card"/><p>點上方新增卡片</p></div>}
      {ac&&<div className="sc">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:"17px",fontWeight:"500"}}>{ac.name}</span>
          <div style={{display:"flex",gap:"8px",alignItems:"center"}}>
            <button onClick={()=>sExpEdit(m=>!m)}

              {expEdit?"完成 ✓":"編輯"}
            </button>
            <button onClick={()=>delCard(ac.id)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--lt)",fontSize:"12px",display:"flex",alignItems:"center",gap:"3px"}}><i className="ti ti-trash"/></button>
          </div>
        </div>

        {/* ── 一般消費 ── */}
        {(()=>{
          const normal=(ac.expenses||[]).filter(e=>!e.tag);
          return(<>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",margin:"12px 0 4px"}}>
              <span style={{fontSize:"11px",color:"var(--lt)",letterSpacing:".06em"}}>✦ 消費明細</span>
              <span style={{fontSize:"10px",color:"var(--lt)"}}>點「標記」→ 金庫／待收款</span>
            </div>
            {normal.map(e=>(
              <div key={e.id}>
                <div style={{display:"grid",gridTemplateColumns:expEdit?"80px 1fr auto 22px":"80px 1fr auto",gap:"5px",alignItems:"center",marginBottom:"3px"}}>

                  <input className="ti" value={e.note} placeholder="備註" onChange={ev=>uE(ac.id,e.id,"note",ev.target.value)}/>

            <div style={{display:"flex",alignItems:"center",gap:"5px",margin:"12px 0 5px"}}>

              <span style={{fontSize:"11px",color:"var(--J)",letterSpacing:".05em",fontWeight:"500"}}>金庫分攤</span>

            {joints.map(e=>(
              <div key={e.id} style={{background:"var(--Jl)",border:"1px solid var(--J)",borderRadius:"9px",padding:"7px 9px",marginBottom:"5px"}}>

                </div>
                <div className="split-row" style={{paddingBottom:0}}>
                  <span className="split-lbl">朋友欠款：</span>
                  <div style={{width:"75px",flexShrink:0}}>
                    <Amt val={getSplit(e)===+e.amt&&e.splitAmt==null?+e.amt:getSplit(e)}

                  </div>
                  {getSplit(e)!==(+e.amt||0)&&<span className="split-note">我付 {fmt((+e.amt||0)-getSplit(e))}</span>}
                </div>
              </div>

        {/* ── 回饋點數 ── */}
        <div className="dv"/>

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:expEdit?"8px":"2px"}}>
              <span className="slbl" style={{marginTop:0,marginBottom:0}}>✦ 回饋點數（扣除）</span>
              {!expEdit&&cbs.length>0&&<span style={{fontSize:"13px",fontWeight:"700",color:"var(--S)"}}>−{fmt(cbTotal)}</span>}
            </div>
            {/* 編輯模式才顯示各筆明細 */}
            {expEdit&&cbs.map(cb=>(
              <div key={cb.id} style={{display:"grid",gridTemplateColumns:"80px 1fr 22px",gap:"5px",alignItems:"center",marginBottom:"5px"}}>
                <Amt val={cb.amt} set={v=>uC(ac.id,cb.id,"amt",v)}/>
                <input className="ti" value={cb.note} placeholder="備註" onChange={ev=>uC(ac.id,cb.id,"note",ev.target.value)}/>
                <button className="xb" onClick={()=>dC(ac.id,cb.id)}><i className="ti ti-x"/></button>
              </div>
            ))}
            {/* 平時顯示簡易 tag 列 */}
            {!expEdit&&cbs.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:"4px",marginBottom:"4px"}}>
              {cbs.map(cb=><span key={cb.id} style={{fontSize:"11px",padding:"2px 7px",borderRadius:"20px",background:"var(--Sl)",color:"var(--S)",border:"1px solid var(--S)"}}>{cb.note||"回饋"} −{fmt(+cb.amt||0)}</span>)}
            </div>}

            {!expEdit&&<button className="gh" onClick={()=>sExpEdit(true)} style={{fontSize:"11px",color:"var(--S)",borderColor:"var(--S)"}}>
              <i className="ti ti-pencil"/> 編輯回饋
            </button>}
          </>);
        })()}

        {/* ── 小計欄 ── */}
        {(()=>{
          const pE=(ac.expenses||[]).reduce((s,e)=>s+expPersonal(e),0);
          const jE=(ac.expenses||[]).reduce((s,e)=>s+expJoint(e),0);
          const pnE=(ac.expenses||[]).reduce((s,e)=>s+expPending(e),0);
          const cb=(ac.cashback||[]).reduce((s,x)=>s+(+x.amt||0),0);
          return<div className="trow">
            <div className="tbox per"><div className="tfml">個人 −{fmt(cb)} 回饋</div><div className="tamt">NT$ {fmt(pE-cb)}</div></div>
            <div className="tbox jnt"><div className="tfml">金庫</div><div className="tamt">NT$ {fmt(jE)}</div></div>
            <div className="tbox pnt"><div className="tfml">待收款</div><div className="tamt">NT$ {fmt(pnE)}</div></div>
          </div>;
        })()}
        {!data.salary.some(s=>s.cardId===ac.id)&&<button className="lsb" onClick={()=>{lC(ac.id);sTab("salary");}}><i className="ti ti-arrow-right"/> 加入每月統整</button>}
      </div>}
    </div>}

    {/* ══ CASH ══ */}
    {tab==="cash"&&<div className="bd">
      {/* add form */}
      <div className="cash-add">
        <div className="cash-add-title">新增現金支出</div>

          <input className="ti" value={cNote} placeholder="備註（如：早餐、超商）" onChange={e=>sCNote(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCash()}/>

      {(!data.cash||data.cash.length===0)&&<div className="empty" style={{padding:"2.5rem 1rem"}}><i className="ti ti-cash"/><p>尚無現金支出記錄</p></div>}

          <div className="cash-note">{e.note}</div>
          <button className="xb" onClick={()=>delCash(e.id)}><i className="ti ti-x"/></button>

      {(data.cash||[]).length>0&&<div className="cash-total">
        <div><div className="cash-total-l">本月現金支出</div><div style={{fontSize:"11px",color:"var(--Cash)",marginTop:"2px"}}>{(data.cash||[]).length} 筆</div></div>
        <div className="cash-total-a">NT$ {fmt(cashTotal())}</div>
      </div>}
    </div>}

    {/* ══ SUMMARY ══ */}
    {tab==="salary"&&<div className="bd">
      {fixed.target>0&&<div className="tbar">
        <div className="tbar-top">
          <span className="tbar-lbl">本月目標 NT$ {fmt(fixed.target)}</span>
          <span style={{fontSize:"12px",fontWeight:"500",color:isOver?"var(--W)":"var(--S)"}}>{pct}% {isOver?"⚠️":"✓"}</span>
        </div>
        <div className="prog"><div className="prog-fill" style={{width:pct+"%",background:isOver?"var(--W)":"var(--S)"}}/></div>

        尚未連結 <button onClick={()=>sTab("cards")} style={{background:"var(--T)",color:"#fff",border:"none",borderRadius:"7px",padding:"2px 8px",fontSize:"11px",cursor:"pointer"}}>前往</button>

      {cardLinks.map(item=>{const c=data.cards.find(c=>c.id===item.cardId);return<div key={item.id} className="ssc">

      {/* 現金 */}
      {cashTotal()>0&&<><div className="sg csg" style={{marginTop:"16px"}}>現金支出</div>
        <div className="ssc" style={{borderColor:"var(--Cash)",background:"#EEF7F2"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div className="sl"><i className="ti ti-cash" style={{color:"var(--Cash)",fontSize:"13px"}}/>本月現金 <span className="ab" style={{color:"var(--Cash)",background:"var(--Cashl)"}}>{(data.cash||[]).length} 筆</span></div>
            <div style={{fontSize:"15px",fontWeight:"700",color:"var(--Cash)"}}>NT$ {fmt(cashTotal())}</div>
          </div>
        </div>
      </>}

      {/* 固定圓餅 */}
      <div className="sg fsg" style={{marginTop:"16px"}}>固定開銷分配</div>

        </div>

      {oneTimers.length>0&&<><div className="sg" style={{marginTop:"15px"}}>本月額外</div>

        </div>
        {fixed.target>0&&<div style={{marginTop:"4px",textAlign:"right"}}>
          <span className={`tgt-chip${isOver?" over":" ok"}`}>{isOver?`超出 NT$ ${fmt(grand-fixed.target)}`:`距目標剩 NT$ ${fmt(fixed.target-grand)}`}</span>
        </div>}
      </div>}

      {allJoint()>0&&<div className="float-box jbox"><div><div className="fb-l"><i className="ti ti-building-bank" style={{marginRight:"4px"}}/>金庫待轉入</div><div className="fb-s">共同帳戶分攤</div></div><div className="fb-a">NT$ {fmt(allJoint())}</div></div>}

/* ─── AddExpSheet：備註 + 計算機合一輸入 ─── */
function AddExpSheet({onAdd,onClose}){
  const[ex,sEx]=useState("");
  const[dp,sDp]=useState("0");
  const[note,sNote]=useState("");
  const nr=useRef(null);

  const upd=e=>{const r=evalX(e);if(r!=null)sDp(fmt(r));else{const m=e.match(/\d+\.?\d*$/);sDp(m?fmt(+m[0]):"0");}};
  const press=k=>{
    if(k==="C"){sEx("");sDp("0");return;}
    if(k==="⌫"){const n=ex.slice(0,-1);sEx(n);n?upd(n):sDp("0");return;}
    if(k==="="){const r=evalX(ex);if(r!=null){sEx(String(r));sDp(fmt(r));}return;}
    const n=ex+k;sEx(n);if(!["+","-","×","÷"].includes(k))upd(n);
  };
  const confirm=()=>{
    const r=evalX(ex);
    const amt=r!=null?Math.round(r):parseFloat(ex)||0;
    if(!amt)return;
    onAdd(amt,note);
    onClose();
  };
  const KS=[
    {l:"C",c:"kc"},{l:"⌫",c:"kc"},{l:"÷",c:"ko"},{l:"×",c:"ko"},
    {l:"7",c:"kn"},{l:"8",c:"kn"},{l:"9",c:"kn"},{l:"-",c:"ko"},
    {l:"4",c:"kn"},{l:"5",c:"kn"},{l:"6",c:"kn"},{l:"+",c:"ko"},
    {l:"1",c:"kn"},{l:"2",c:"kn"},{l:"3",c:"kn"},{l:"=",c:"ke"},
    {l:"0",c:"kn",s:{gridColumn:"span 2"}},{l:".",c:"kn"},
    {l:"加入",c:"kk",a:confirm},
  ];
  return(
    <div className="ov" onClick={onClose}>
      <div className="cp" onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
          <span style={{fontSize:"15px",fontWeight:"500",fontFamily:"var(--fn)"}}>新增消費</span>
          <button className="xb" style={{fontSize:"20px"}} onClick={onClose}><i className="ti ti-x"/></button>
        </div>
        <input ref={nr} className="ti" value={note} placeholder="消費項目（如：洗鞋劑、Netflix）"
          onChange={e=>sNote(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&e.target.blur()}
          autoFocus
          style={{marginBottom:"12px",fontSize:"15px",padding:"9px 12px"}}/>
        <div className="cdisp"><div className="cexpr">{ex||"\u00a0"}</div><div className="cres">{dp}</div></div>
        <div className="cgrid">
          {KS.map((k,i)=><button key={i} className={`cb ${k.c}`} style={k.s||{}} onClick={k.a||(()=>press(k.l))}>{k.l}</button>)}
        </div>
      </div>
    </div>
  );
}

/* ─── LockedApp：最外層密碼鎖定包裝 ─── */
function LockedApp(){
  const[unlocked,sUnlocked]=React.useState(false);
  if(!unlocked)return React.createElement(PinScreen,{onUnlock:()=>sUnlocked(true)});
  return React.createElement(App);
}

class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e};}
  componentDidCatch(e,info){console.error("App crash:",e,info);}
  render(){
    if(this.state.err){
      const msg=(this.state.err?.message||'未知錯誤');
      const stk=(this.state.err?.stack||'').split('\n').slice(0,4).join('\n');
      return(
        <div style={{padding:"1.5rem",fontFamily:"var(--fn)"}}>
          <div style={{fontSize:"26px",marginBottom:"8px"}}>😵</div>
          <div style={{fontSize:"15px",fontWeight:"500",color:"var(--dk)",marginBottom:"6px"}}>頁面發生錯誤</div>
          <pre style={{fontSize:"11px",color:"var(--W)",background:"var(--Wl)",padding:"8px 10px",borderRadius:"8px",overflow:"auto",marginBottom:"12px",whiteSpace:"pre-wrap",lineHeight:"1.5"}}>{msg}{"\n"+stk}</pre>
          <div style={{display:"flex",gap:"8px"}}>
            <button onClick={()=>this.setState({err:null})}
              style={{flex:1,padding:"8px",background:"none",border:"1px solid var(--bdr)",borderRadius:"8px",cursor:"pointer",fontSize:"13px",fontFamily:"var(--fn)",color:"var(--md)"}}>
              嘗試繼續
            </button>
            <button onClick={()=>window.location.reload()}
              style={{flex:1,padding:"8px",background:"var(--T)",color:"#fff",border:"none",borderRadius:"8px",cursor:"pointer",fontSize:"13px",fontFamily:"var(--fn)"}}>
              重新整理
            </button>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}
ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(ErrorBoundary,null,React.createElement(LockedApp))
);
</script>

<script>
/* 產生豬豬存錢筒 icon → 設定 apple-touch-icon & PWA manifest */
(function(){
  const SVG = `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <rect width="200" height="200" rx="42" fill="#F4EDE0"/>

    <!-- Stack 1 side (4 coins) -->
    <rect x="89" y="105" width="38" height="49" rx="2" fill="#C49028" stroke="#3A2A1C" stroke-width="4.5"/>
    <line x1="89" y1="117" x2="127" y2="117" stroke="#3A2A1C" stroke-width="3"/>
    <line x1="89" y1="129" x2="127" y2="129" stroke="#3A2A1C" stroke-width="3"/>
    <line x1="89" y1="141" x2="127" y2="141" stroke="#3A2A1C" stroke-width="3"/>
    <!-- Stack 1 top face -->
    <ellipse cx="108" cy="105" rx="19" ry="7.5" fill="#EBC84A" stroke="#3A2A1C" stroke-width="4.5"/>
    <line x1="101" y1="103" x2="105" y2="100" stroke="#3A2A1C" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="111" y1="103" x2="115" y2="100" stroke="#3A2A1C" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Stack 2 side (3 coins) -->
    <rect x="142" y="118" width="34" height="36" rx="2" fill="#C49028" stroke="#3A2A1C" stroke-width="4"/>
    <line x1="142" y1="130" x2="176" y2="130" stroke="#3A2A1C" stroke-width="3"/>
    <line x1="142" y1="142" x2="176" y2="142" stroke="#3A2A1C" stroke-width="3"/>
    <!-- Stack 2 top face -->
    <ellipse cx="159" cy="118" rx="17" ry="6.5" fill="#EBC84A" stroke="#3A2A1C" stroke-width="4"/>
    <line x1="153" y1="116" x2="157" y2="113" stroke="#3A2A1C" stroke-width="2" stroke-linecap="round"/>
    <line x1="163" y1="116" x2="167" y2="113" stroke="#3A2A1C" stroke-width="2" stroke-linecap="round"/>

    <!-- Standing coin (front-left, renders last = on top) -->
    <circle cx="52" cy="139" r="29" fill="#C49028" stroke="#3A2A1C" stroke-width="5"/>
    <circle cx="52" cy="139" r="22" fill="#EBC84A"/>
    <text x="52" y="148" text-anchor="middle" fill="#3A2A1C" font-size="26" font-weight="bold" font-family="Georgia,serif">$</text>
  </svg>`;


  const blob = new Blob([SVG],{type:'image/svg+xml'});
  const url  = URL.createObjectURL(blob);
  const img  = new Image();
  img.onload = function(){
    const SIZES = [180, 192, 512];
    const pngs  = {};
    SIZES.forEach(s=>{
      const cv = document.createElement('canvas');
      cv.width = cv.height = s;
      cv.getContext('2d').drawImage(img,0,0,s,s);
      pngs[s] = cv.toDataURL('image/png');
    });
    URL.revokeObjectURL(url);

    /* apple-touch-icon */
    const atl = document.createElement('link');
    atl.rel  = 'apple-touch-icon';
    atl.href = pngs[180];
    document.head.appendChild(atl);

    /* favicon */
    const fav = document.createElement('link');
    fav.rel  = 'icon';
    fav.type = 'image/png';
    fav.href = pngs[192];
    document.head.appendChild(fav);

    /* PWA manifest */
    const manifest = {
      name:'記帳本', short_name:'記帳本',
      description:'個人記帳 · 信用卡 · 固定開銷',
      start_url:'.', display:'standalone',
      background_color:'#F4EDE0', theme_color:'#F4EDE0',
      icons:[
        {src:pngs[192], sizes:'192x192', type:'image/png'},
        {src:pngs[512], sizes:'512x512', type:'image/png', purpose:'any maskable'}
      ]
    };
    const mb = new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});
    const ml = document.createElement('link');
    ml.rel  = 'manifest';
    ml.href = URL.createObjectURL(mb);
    document.head.appendChild(ml);
  };
  img.src = url;
})();
</script>
